<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>벽돌깨기</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121826;
      --panel: #1d2636;
      --panel-2: #263246;
      --text: #f5f7fb;
      --muted: #aeb9ca;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #42d392;
      --accent-2: #ffcf5a;
      --danger: #ff6b6b;
      --cyan: #55d6ff;
      --pink: #ff7ab6;
      --orange: #ff9f43;
      --green: #2ed573;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100%;
      background:
        radial-gradient(circle at 15% 18%, rgba(85, 214, 255, 0.12), transparent 28%),
        radial-gradient(circle at 88% 78%, rgba(66, 211, 146, 0.12), transparent 30%),
        linear-gradient(135deg, #101522 0%, #161d2b 44%, #121826 100%);
      color: var(--text);
      font-family: Arial, "Noto Sans KR", sans-serif;
      letter-spacing: 0;
      overflow-x: hidden;
    }

    .shell {
      width: min(1120px, calc(100% - 28px));
      min-height: 100%;
      margin: 0 auto;
      padding: 22px 0 26px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.05;
      font-weight: 900;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(88px, 1fr));
      gap: 8px;
      width: min(430px, 100%);
    }

    .stat {
      min-height: 58px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      background: rgba(29, 38, 54, 0.86);
      border-radius: 8px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 22px;
      line-height: 1;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 250px;
      gap: 14px;
      align-items: stretch;
      min-height: 0;
    }

    .stage-wrap {
      position: relative;
      min-height: 380px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b1020;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 380px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(180deg, #101a31 0%, #0a0f1e 100%);
      background-size: 36px 36px, 36px 36px, 100% 100%;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(8, 12, 24, 0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .message {
      width: min(460px, 100%);
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(29, 38, 54, 0.95);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .message h2 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.05;
    }

    .message p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    aside {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .panel {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(29, 38, 54, 0.88);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .key-grid {
      display: grid;
      gap: 8px;
    }

    .key-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    kbd {
      display: inline-grid;
      place-items: center;
      min-height: 30px;
      padding: 4px 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-bottom-color: rgba(0, 0, 0, 0.45);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      font: 700 12px Arial, "Noto Sans KR", sans-serif;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #07130f;
      font: 900 14px Arial, "Noto Sans KR", sans-serif;
      cursor: pointer;
    }

    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
    }

    button:focus-visible {
      outline: 3px solid rgba(85, 214, 255, 0.65);
      outline-offset: 2px;
    }

    .meter {
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      overflow: hidden;
    }

    .meter div {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 140ms ease;
    }

    .small {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    footer {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 820px) {
      .shell {
        width: min(100% - 20px, 680px);
        padding-top: 12px;
      }

      header {
        display: grid;
      }

      .stats {
        width: 100%;
      }

      main {
        grid-template-columns: 1fr;
      }

      .stage-wrap,
      canvas {
        min-height: 440px;
      }

      aside {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 560px) {
      .stats {
        grid-template-columns: repeat(3, 1fr);
      }

      .stat {
        min-height: 52px;
        padding: 8px;
      }

      .stat strong {
        font-size: 19px;
      }

      aside {
        grid-template-columns: 1fr;
      }

      .stage-wrap,
      canvas {
        min-height: 390px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>벽돌깨기</h1>
      <section class="stats" aria-label="게임 상태">
        <div class="stat">
          <span>점수</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat">
          <span>목숨</span>
          <strong id="lives">3</strong>
        </div>
        <div class="stat">
          <span>레벨</span>
          <strong id="level">1</strong>
        </div>
      </section>
    </header>

    <main>
      <section class="stage-wrap" aria-label="벽돌깨기 게임">
        <canvas id="game" width="900" height="620"></canvas>
        <div class="overlay visible" id="overlay">
          <div class="message">
            <h2 id="messageTitle">준비됐나요?</h2>
            <p id="messageText">공을 튕겨 모든 벽돌을 깨세요. 키보드, 마우스, 터치 모두 사용할 수 있습니다.</p>
            <button id="overlayButton" type="button">시작</button>
          </div>
        </div>
      </section>

      <aside>
        <section class="panel">
          <h2>조작</h2>
          <div class="key-grid">
            <div class="key-row"><kbd>← →</kbd><span>패들 이동</span></div>
            <div class="key-row"><kbd>Space</kbd><span>시작 / 일시정지</span></div>
            <div class="key-row"><kbd>R</kbd><span>처음부터 다시</span></div>
          </div>
        </section>

        <section class="panel">
          <h2>진행도</h2>
          <div class="meter" aria-hidden="true"><div id="progress"></div></div>
          <p class="small" id="remaining">남은 벽돌 0개</p>
        </section>

        <section class="panel">
          <h2>게임</h2>
          <div class="buttons">
            <button id="playPause" type="button">시작</button>
            <button class="secondary" id="restart" type="button">재시작</button>
          </div>
          <p class="small">연속으로 벽돌을 깨면 공이 조금씩 빨라집니다.</p>
        </section>
      </aside>
    </main>

    <footer>마우스나 손가락으로도 패들을 바로 움직일 수 있습니다.</footer>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const levelEl = document.getElementById("level");
    const progressEl = document.getElementById("progress");
    const remainingEl = document.getElementById("remaining");
    const overlay = document.getElementById("overlay");
    const messageTitle = document.getElementById("messageTitle");
    const messageText = document.getElementById("messageText");
    const overlayButton = document.getElementById("overlayButton");
    const playPauseButton = document.getElementById("playPause");
    const restartButton = document.getElementById("restart");

    const colors = ["#55d6ff", "#42d392", "#ffcf5a", "#ff7ab6", "#ff9f43"];
    const state = {
      running: false,
      paused: false,
      gameOver: false,
      score: 0,
      lives: 3,
      level: 1,
      left: false,
      right: false,
      bricks: [],
      particles: [],
      lastTime: 0,
      brickCount: 0,
      paddle: { x: 0, y: 0, w: 130, h: 16, speed: 620 },
      ball: { x: 0, y: 0, r: 9, vx: 260, vy: -310, speed: 405 }
    };

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      clampPaddle();
      if (!state.running) resetBall();
      draw();
    }

    function width() {
      return canvas.getBoundingClientRect().width;
    }

    function height() {
      return canvas.getBoundingClientRect().height;
    }

    function newGame() {
      state.running = false;
      state.paused = false;
      state.gameOver = false;
      state.score = 0;
      state.lives = 3;
      state.level = 1;
      state.particles = [];
      buildLevel();
      resetBall();
      showOverlay("준비됐나요?", "공을 튕겨 모든 벽돌을 깨세요. 키보드, 마우스, 터치 모두 사용할 수 있습니다.", "시작");
      updateUi();
      draw();
    }

    function buildLevel() {
      const rows = Math.min(5 + state.level, 8);
      const cols = width() < 540 ? 7 : 10;
      const gap = 8;
      const top = 56;
      const side = width() < 540 ? 14 : 26;
      const brickW = (width() - side * 2 - gap * (cols - 1)) / cols;
      const brickH = width() < 540 ? 20 : 24;
      state.bricks = [];

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          const sturdy = row < Math.floor(state.level / 2);
          state.bricks.push({
            x: side + col * (brickW + gap),
            y: top + row * (brickH + gap),
            w: brickW,
            h: brickH,
            hp: sturdy ? 2 : 1,
            maxHp: sturdy ? 2 : 1,
            color: colors[(row + col) % colors.length]
          });
        }
      }

      state.brickCount = state.bricks.length;
    }

    function resetBall() {
      state.paddle.w = Math.max(86, Math.min(140, width() * 0.17));
      state.paddle.x = width() / 2 - state.paddle.w / 2;
      state.paddle.y = height() - 54;
      state.ball.r = width() < 540 ? 8 : 9;
      state.ball.speed = 390 + state.level * 18;
      state.ball.x = width() / 2;
      state.ball.y = state.paddle.y - state.ball.r - 2;
      const angle = -Math.PI / 2 + (Math.random() * 0.5 - 0.25);
      state.ball.vx = Math.cos(angle) * state.ball.speed;
      state.ball.vy = Math.sin(angle) * state.ball.speed;
    }

    function startGame() {
      if (state.gameOver) newGame();
      state.running = true;
      state.paused = false;
      hideOverlay();
      updateUi();
      state.lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function togglePause() {
      if (!state.running) {
        startGame();
        return;
      }
      state.paused = !state.paused;
      if (state.paused) {
        showOverlay("일시정지", "숨을 고르고 다시 이어서 플레이하세요.", "계속");
      } else {
        hideOverlay();
        state.lastTime = performance.now();
        requestAnimationFrame(loop);
      }
      updateUi();
    }

    function loop(time) {
      if (!state.running || state.paused) return;
      const dt = Math.min(0.02, (time - state.lastTime) / 1000 || 0);
      state.lastTime = time;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function update(dt) {
      const paddle = state.paddle;
      const ball = state.ball;

      if (state.left) paddle.x -= paddle.speed * dt;
      if (state.right) paddle.x += paddle.speed * dt;
      clampPaddle();

      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      if (ball.x - ball.r <= 0) {
        ball.x = ball.r;
        ball.vx *= -1;
      }
      if (ball.x + ball.r >= width()) {
        ball.x = width() - ball.r;
        ball.vx *= -1;
      }
      if (ball.y - ball.r <= 0) {
        ball.y = ball.r;
        ball.vy *= -1;
      }

      if (circleRect(ball, paddle) && ball.vy > 0) {
        const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const angle = -Math.PI / 2 + hit * 0.95;
        const nextSpeed = Math.min(690, Math.hypot(ball.vx, ball.vy) + 6);
        ball.vx = Math.cos(angle) * nextSpeed;
        ball.vy = Math.sin(angle) * nextSpeed;
        ball.y = paddle.y - ball.r - 1;
      }

      for (const brick of state.bricks) {
        if (brick.hp > 0 && circleRect(ball, brick)) {
          brick.hp -= 1;
          const overlapX = Math.min(Math.abs(ball.x - brick.x), Math.abs(ball.x - (brick.x + brick.w)));
          const overlapY = Math.min(Math.abs(ball.y - brick.y), Math.abs(ball.y - (brick.y + brick.h)));
          if (overlapX < overlapY) ball.vx *= -1;
          else ball.vy *= -1;
          if (brick.hp <= 0) {
            state.score += 100 * state.level;
            burst(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color);
            speedUp(1.014);
          } else {
            state.score += 35 * state.level;
          }
          break;
        }
      }

      if (ball.y - ball.r > height()) loseLife();

      state.particles = state.particles
        .map((p) => ({ ...p, x: p.x + p.vx * dt, y: p.y + p.vy * dt, life: p.life - dt }))
        .filter((p) => p.life > 0);

      if (state.bricks.every((brick) => brick.hp <= 0)) nextLevel();
      updateUi();
    }

    function circleRect(circle, rect) {
      const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
      const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
      const dx = circle.x - closestX;
      const dy = circle.y - closestY;
      return dx * dx + dy * dy <= circle.r * circle.r;
    }

    function speedUp(multiplier) {
      const speed = Math.min(710, Math.hypot(state.ball.vx, state.ball.vy) * multiplier);
      const angle = Math.atan2(state.ball.vy, state.ball.vx);
      state.ball.vx = Math.cos(angle) * speed;
      state.ball.vy = Math.sin(angle) * speed;
    }

    function loseLife() {
      state.lives -= 1;
      if (state.lives <= 0) {
        state.running = false;
        state.gameOver = true;
        showOverlay("게임 종료", `최종 점수는 ${state.score.toLocaleString()}점입니다.`, "다시 시작");
      } else {
        state.running = false;
        resetBall();
        showOverlay("공을 놓쳤어요", `남은 목숨 ${state.lives}개. 다시 한번 가봅시다.`, "계속");
      }
      updateUi();
    }

    function nextLevel() {
      state.level += 1;
      state.running = false;
      buildLevel();
      resetBall();
      showOverlay("레벨 클리어", `레벨 ${state.level}로 올라갑니다. 벽돌이 더 단단해져요.`, "다음 레벨");
      updateUi();
      draw();
    }

    function burst(x, y, color) {
      for (let i = 0; i < 14; i += 1) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 60 + Math.random() * 190;
        state.particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 2 + Math.random() * 4,
          life: 0.35 + Math.random() * 0.35,
          color
        });
      }
    }

    function draw() {
      const w = width();
      const h = height();
      ctx.clearRect(0, 0, w, h);
      drawStars(w, h);
      drawBricks();
      drawPaddle();
      drawBall();
      drawParticles();
    }

    function drawStars(w, h) {
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = "#ffffff";
      for (let i = 0; i < 42; i += 1) {
        const x = (i * 97) % w;
        const y = (i * 53) % h;
        ctx.fillRect(x, y, i % 3 === 0 ? 2 : 1, i % 4 === 0 ? 2 : 1);
      }
      ctx.restore();
    }

    function drawBricks() {
      for (const brick of state.bricks) {
        if (brick.hp <= 0) continue;
        ctx.save();
        ctx.fillStyle = brick.color;
        ctx.globalAlpha = brick.hp / brick.maxHp === 1 ? 1 : 0.56;
        roundRect(brick.x, brick.y, brick.w, brick.h, 5);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        roundRect(brick.x + 4, brick.y + 4, brick.w - 8, 4, 3);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawPaddle() {
      const p = state.paddle;
      const gradient = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y);
      gradient.addColorStop(0, "#55d6ff");
      gradient.addColorStop(0.55, "#f5f7fb");
      gradient.addColorStop(1, "#42d392");
      ctx.fillStyle = gradient;
      roundRect(p.x, p.y, p.w, p.h, 8);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      roundRect(p.x + 10, p.y + 3, p.w - 20, 4, 3);
      ctx.fill();
    }

    function drawBall() {
      const b = state.ball;
      const gradient = ctx.createRadialGradient(b.x - 3, b.y - 4, 2, b.x, b.y, b.r + 4);
      gradient.addColorStop(0, "#ffffff");
      gradient.addColorStop(0.38, "#ffcf5a");
      gradient.addColorStop(1, "#ff7ab6");
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawParticles() {
      for (const p of state.particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life / 0.7);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function roundRect(x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    function clampPaddle() {
      state.paddle.x = Math.max(0, Math.min(width() - state.paddle.w, state.paddle.x));
    }

    function movePaddleTo(clientX) {
      const rect = canvas.getBoundingClientRect();
      state.paddle.x = clientX - rect.left - state.paddle.w / 2;
      clampPaddle();
      if (!state.running) {
        state.ball.x = state.paddle.x + state.paddle.w / 2;
        state.ball.y = state.paddle.y - state.ball.r - 2;
        draw();
      }
    }

    function showOverlay(title, text, button) {
      messageTitle.textContent = title;
      messageText.textContent = text;
      overlayButton.textContent = button;
      overlay.classList.add("visible");
    }

    function hideOverlay() {
      overlay.classList.remove("visible");
    }

    function updateUi() {
      scoreEl.textContent = state.score.toLocaleString();
      livesEl.textContent = state.lives;
      levelEl.textContent = state.level;
      const remaining = state.bricks.filter((brick) => brick.hp > 0).length;
      const cleared = state.brickCount - remaining;
      progressEl.style.width = `${state.brickCount ? (cleared / state.brickCount) * 100 : 0}%`;
      remainingEl.textContent = `남은 벽돌 ${remaining}개`;
      playPauseButton.textContent = !state.running ? "시작" : state.paused ? "계속" : "일시정지";
    }

    window.addEventListener("resize", () => {
      buildLevel();
      resizeCanvas();
      updateUi();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") state.left = true;
      if (event.key === "ArrowRight") state.right = true;
      if (event.code === "Space") {
        event.preventDefault();
        togglePause();
      }
      if (event.key.toLowerCase() === "r") newGame();
    });

    window.addEventListener("keyup", (event) => {
      if (event.key === "ArrowLeft") state.left = false;
      if (event.key === "ArrowRight") state.right = false;
    });

    canvas.addEventListener("pointermove", (event) => movePaddleTo(event.clientX));
    canvas.addEventListener("pointerdown", (event) => {
      movePaddleTo(event.clientX);
      if (!state.running || state.paused) startGame();
    });

    overlayButton.addEventListener("click", startGame);
    playPauseButton.addEventListener("click", togglePause);
    restartButton.addEventListener("click", newGame);

    resizeCanvas();
    newGame();
  </script>
</body>
</html>
