<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TO DO LIST</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --text: #172033;
      --muted: #657187;
      --panel: #ffffff;
      --line: #dce3ee;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --yellow: #f59e0b;
      --shadow: 0 18px 50px rgba(31, 42, 68, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 42%),
        linear-gradient(225deg, rgba(22, 163, 74, 0.08), transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: Arial, "Noto Sans KR", sans-serif;
      letter-spacing: 0;
    }

    .app {
      width: min(760px, calc(100% - 28px));
      margin: 0 auto;
      padding: 36px 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 64px);
      line-height: 0.95;
      font-weight: 900;
    }

    .date {
      color: var(--muted);
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      color: var(--text);
      font: 700 16px Arial, "Noto Sans KR", sans-serif;
      outline: none;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      background: var(--blue);
      color: #fff;
      font: 900 14px Arial, "Noto Sans KR", sans-serif;
      cursor: pointer;
    }

    button.secondary {
      background: #eef2f7;
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.danger {
      background: #fff1f2;
      color: var(--red);
      border: 1px solid #fecdd3;
    }

    button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.28);
      outline-offset: 2px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 64px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    li:last-child {
      border-bottom: 0;
    }

    .check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--line);
      background: #fff;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 15px;
      line-height: 1;
      padding: 0;
    }

    li.done .check {
      background: var(--green);
      border-color: var(--green);
    }

    .task-text {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 16px;
      font-weight: 800;
    }

    li.done .task-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .empty {
      padding: 38px 18px;
      color: var(--muted);
      text-align: center;
      font-weight: 800;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .stat {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 24px;
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 18px, 760px);
        padding: 18px 0;
      }

      header {
        display: block;
      }

      .date {
        margin-top: 8px;
        text-align: left;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>TO DO<br />LIST</h1>
      <div class="date" id="today"></div>
    </header>

    <section class="panel" aria-label="할 일 목록">
      <form class="composer" id="form">
        <input id="taskInput" type="text" autocomplete="off" maxlength="80" placeholder="할 일을 입력하세요" />
        <button type="submit">추가</button>
      </form>

      <div class="toolbar">
        <div class="filters" aria-label="필터">
          <button class="secondary filter active" type="button" data-filter="all">전체</button>
          <button class="secondary filter" type="button" data-filter="active">할 일</button>
          <button class="secondary filter" type="button" data-filter="done">완료</button>
        </div>
        <div class="count" id="count">0개 남음</div>
      </div>

      <ul id="list"></ul>
      <div class="empty" id="empty">아직 할 일이 없습니다.</div>
    </section>

    <section class="summary" aria-label="요약">
      <div class="stat">
        <span>전체</span>
        <strong id="total">0</strong>
      </div>
      <div class="stat">
        <span>남은 일</span>
        <strong id="active">0</strong>
      </div>
      <div class="stat">
        <span>완료</span>
        <strong id="done">0</strong>
      </div>
    </section>
  </main>

  <script>
    const storageKey = "codex-todo-list";
    const form = document.getElementById("form");
    const input = document.getElementById("taskInput");
    const list = document.getElementById("list");
    const empty = document.getElementById("empty");
    const count = document.getElementById("count");
    const totalEl = document.getElementById("total");
    const activeEl = document.getElementById("active");
    const doneEl = document.getElementById("done");
    const today = document.getElementById("today");
    const filterButtons = document.querySelectorAll(".filter");

    let filter = "all";
    let tasks = JSON.parse(localStorage.getItem(storageKey) || "[]");

    today.textContent = new Intl.DateTimeFormat("ko-KR", {
      dateStyle: "full"
    }).format(new Date());

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(tasks));
    }

    function addTask(text) {
      tasks.unshift({
        id: crypto.randomUUID(),
        text,
        done: false,
        createdAt: Date.now()
      });
      save();
      render();
    }

    function toggleTask(id) {
      tasks = tasks.map((task) => task.id === id ? { ...task, done: !task.done } : task);
      save();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter((task) => task.id !== id);
      save();
      render();
    }

    function visibleTasks() {
      if (filter === "active") return tasks.filter((task) => !task.done);
      if (filter === "done") return tasks.filter((task) => task.done);
      return tasks;
    }

    function render() {
      const activeCount = tasks.filter((task) => !task.done).length;
      const doneCount = tasks.length - activeCount;
      const shown = visibleTasks();

      list.innerHTML = "";
      empty.style.display = shown.length ? "none" : "block";

      for (const task of shown) {
        const item = document.createElement("li");
        item.className = task.done ? "done" : "";

        const check = document.createElement("button");
        check.className = "check";
        check.type = "button";
        check.textContent = task.done ? "✓" : "";
        check.setAttribute("aria-label", task.done ? "완료 취소" : "완료");
        check.addEventListener("click", () => toggleTask(task.id));

        const text = document.createElement("div");
        text.className = "task-text";
        text.textContent = task.text;

        const remove = document.createElement("button");
        remove.className = "danger";
        remove.type = "button";
        remove.textContent = "삭제";
        remove.addEventListener("click", () => deleteTask(task.id));

        item.append(check, text, remove);
        list.append(item);
      }

      count.textContent = `${activeCount}개 남음`;
      totalEl.textContent = tasks.length;
      activeEl.textContent = activeCount;
      doneEl.textContent = doneCount;
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      addTask(text);
      input.value = "";
      input.focus();
    });

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        filter = button.dataset.filter;
        filterButtons.forEach((item) => item.classList.toggle("active", item === button));
        render();
      });
    });

    render();
  </script>
</body>
</html>
